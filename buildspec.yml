version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 446550123588.dkr.ecr.ap-south-1.amazonaws.com
      - REPOSITORY_URI=446550123588.dkr.ecr.ap-south-1.amazonaws.com/brain-tasks-app
  build:
    commands:
      - echo Build started on `date`
      - echo Building the Docker image...
      - docker build -t $REPOSITORY_URI:latest .
      - docker tag $REPOSITORY_URI:latest $REPOSITORY_URI:$CODEBUILD_RESOLVED_SOURCE_VERSION
  post_build:
    commands:
      - echo Build completed on `date`
      - echo Pushing the Docker images...
      - docker push $REPOSITORY_URI:latest
      - docker push $REPOSITORY_URI:$CODEBUILD_RESOLVED_SOURCE_VERSION
      - echo Updating K8s deployment...
      - aws eks update-kubeconfig --name brain-cluster --region ap-south-1
      - kubectl set image deployment/brain-app-deployment brain-app-container=$REPOSITORY_URI:$CODEBUILD_RESOLVED_SOURCE_VERSION
